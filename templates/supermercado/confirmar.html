{% extends "supermercado/base.html" %}
{% block contenido %}
<div class="cabecera"><h1>{{ titulo }}</h1></div>
<div class="caja" style="padding:1.5rem;max-width:640px;">
  <p style="margin-top:0;">¿Confirma la acción sobre <strong>{{ objeto }}</strong>?</p>
  {% if nota %}<div class="msg msg-warning">{{ nota }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="acciones">
      <button type="submit" class="btn btn-rojo">Sí, confirmar</button>
      <a class="btn btn-borde" href="{% url volver %}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
